name: 构建洛雪音乐Docker镜像
on:
  workflow_dispatch:

# 关键：授予创建Release、Tag必须的写入权限
permissions:
  contents: write
  releases: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      - name: 设置Docker构建环境
        uses: docker/setup-buildx-action@v3

      - name: 构建Docker镜像
        run: docker build -t local/lx-music-desktop:latest .

      - name: 导出为tar离线包
        run: docker save -o lx-music-desktop-amd64.tar local/lx-music-desktop:latest

      # 临时产物备份
      - name: 上传构建临时产物
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-desktop-amd64-tar
          path: lx-music-desktop-amd64.tar
          retention-days: 30

      # 发布到Release（修正参数名：overwrite → overwrite_files）
      - name: 发布镜像到Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: LX-Music-Docker v1.0.0
          body: 洛雪音乐Ubuntu22.04 noVNC离线Docker镜像 amd64架构
          files: lx-music-desktop-amd64.tar
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
